<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kütüphane Yönetim Sistemi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Kütüphane Yönetim Sistemi</h1>

    <h2>Kitap Ekle</h2>
    <form id="addBookForm">
        <label for="title">Başlık:</label>
        <input type="text" id="title" name="title" required><br>

        <label for="author">Yazar:</label>
        <input type="text" id="author" name="author" required><br>

        <label for="publicationYear">Yayın Yılı:</label>
        <input type="number" id="publicationYear" name="publicationYear" required><br>

        <label for="isbn">ISBN:</label>
        <input type="text" id="isbn" name="isbn" required><br>

        <button type="submit">Kitap Ekle</button>
        <p id="addMessage" class="message"></p>
    </form>

    <h2>Kitap Listesi</h2>
    <div class="controls">
         <label for="search">Ara:</label>
         <input type="text" id="search" placeholder="Başlık, yazar veya ISBN...">
         <button id="searchButton">Ara</button>
         <button id="listAllButton">Tümünü Listele</button>
    </div>
    <table id="bookTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Başlık</th>
                <th>Yazar</th>
                <th>Yayın Yılı</th>
                <th>ISBN</th>
                <th>Durum</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody id="bookTableBody">
            <!-- Kitaplar buraya JavaScript ile eklenecek -->
        </tbody>
    </table>
     <p id="listMessage" class="message"></p>

    <script src="script.js"></script>
</body>
</html>
