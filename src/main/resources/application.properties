# Library Management System - Security Configuration

# Application Configuration
spring.application.name=library-management-system
server.port=8080

# JWT Configuration
jwt.secret=myVerySecureSecretKeyThatShouldBeChangedInProductionAndBeAtLeast256BitsLong
jwt.expiration=86400

# Security Configuration
# Enable security debug (disable in production)
logging.level.org.springframework.security=INFO

# Session Configuration (stateless for JWT)
server.servlet.session.tracking-modes=none
server.servlet.session.timeout=0

# Error handling configuration
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# File upload restrictions (security)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson Security Configuration
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Validation Configuration
spring.validation.validate-on-startup=true

# Logging Configuration for Security Events
logging.level.com.librarysystem.security=INFO
logging.level.com.librarysystem.controller=INFO

# Production-ready configurations (commented for development)
# server.ssl.enabled=true
# server.ssl.key-store-type=PKCS12
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=password
